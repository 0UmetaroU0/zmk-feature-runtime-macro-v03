name: Restore Web UI Baseline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Check out full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore the upstream Key Seq UI files
        run: |
          git checkout 12fdf89 -- web/src/App.tsx web/src/macroCodec.ts

      - name: Commit restored files
        run: |
          if git diff --quiet -- web/src/App.tsx web/src/macroCodec.ts; then
            echo "The two Web UI files are already restored."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add web/src/App.tsx web/src/macroCodec.ts
          git commit -m "Restore upstream Key Seq web UI"
          git push
